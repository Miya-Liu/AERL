name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies and run tests
        env:
          UPSTREAM_OPENAI_BASE_URL: https://upstream.test/v1
          AERL_DATA_DIR: ${{ runner.temp }}/aerl-ci-data
        run: |
          uv sync --extra dev --python ${{ matrix.python-version }}
          uv run pytest -q
