experiment_name: tpfc-tree-distill
trial_name: trial0

seed: 1
enable_offload: true
total_train_epochs: 10
tokenizer_path: ${actor.path}

# TPFC Agent workflow — resolved to agent instance at runtime by train script
workflow: customized_areal.tpfc.tpfc_agent.TPFCAgent
eval_workflow: ${workflow}

cluster:
  n_nodes: 1
  n_gpus_per_node: 3
  fileroot: /dfs/share-groups/letrain/zhoujie/AReaL-main/tmp/areal/experiments
  name_resolve:
    type: nfs
    nfs_record_root: /dfs/share-groups/letrain/zhoujie/AReaL-main/tmp/areal/name_resolve

# 3 GPUs: 1 for inference (sglang DP), 2 for training (fsdp DP)
# train_dataset.batch_size must be divisible by fsdp DP size (2)
allocation_mode: sglang:d1+fsdp:d2

scheduler:
  type: local

rollout:
  backend: sglang:d1
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  tokenizer_path: ${tokenizer_path}
  max_concurrent_rollouts: 40
  queue_size: null
  consumer_batch_size: ${train_dataset.batch_size}
  max_head_offpolicyness: 6
  enable_rollout_tracing: false
  scheduling_spec: ${actor.scheduling_spec}
  dump_to_file: true
  openai:
    mode: inline
    tool_call_parser: qwen25
    reasoning_parser: qwen3
    export_style: individual
    turn_discount: 1.0
    engine_max_tokens: 20000

gconfig:
  n_samples: 8
  min_new_tokens: 0
  max_new_tokens: 1024
  max_tokens: 20000
  greedy: false
  temperature: 1.0

actor:
  backend: fsdp:d2
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  attn_impl: flash_attention_2
  path: /dfs/share-groups/letrain/ckpt/Qwen3-VL-8B-Instruct
  init_from_scratch: false
  disable_dropout: true
  gradient_checkpointing: true
  archon:
    ac_mode: memory_budget
    ac_memory_budget: 0.2
  dtype: bfloat16
  mb_spec:
    max_tokens_per_mb: 40960
  optimizer:
    type: adam
    lr: 1.70e-5
    weight_decay: 0.017
    beta1: 0.9
    beta2: 0.999
    eps: 1e-8
    lr_scheduler_type: constant
    gradient_clipping: 1.0
    warmup_steps_proportion: 0.001
  eps_clip: 0.4
  temperature: ${gconfig.temperature}
  reward_scaling: 10.0
  reward_bias: -0.5
  kl_ctl: 0.0
  ppo_n_minibatches: 4
  recompute_logprob: true
  use_decoupled_loss: true
  behave_imp_weight_cap: 5.0
  reward_norm: null
  adv_norm:
    mean_level: batch
    std_level: batch
  weight_update_mode: xccl
  max_new_tokens: ${gconfig.max_new_tokens}
  scheduling_spec:
    - task_type: worker
      port_count: 2
      gpu: 1
      cmd: python3 -m areal.infra.rpc.rpc_server
      env_vars:
        NCCL_DEBUG: "WARN"
        NCCL_IB_DISABLE: "1"
        NCCL_SOCKET_IFNAME: "eth0"
        PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"

ref:
  backend: fsdp:d2
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: ${actor.path}
  init_from_scratch: false
  disable_dropout: true
  dtype: ${actor.dtype}
  mb_spec:
    max_tokens_per_mb: 81920
  optimizer: null
  scheduling_strategy:
    type: colocation
    target: actor
  scheduling_spec: ${actor.scheduling_spec}

# SGLang
sglang:
  model_path: ${actor.path}
  random_seed: ${seed}
  skip_tokenizer_init: true
  dtype: ${actor.dtype}
  max_running_requests: null
  context_length: 40960
  mem_fraction_static: 0.80
  enable_multimodal: true

vllm:
  model: ${actor.path}
  seed: ${seed}
  skip_tokenizer_init: false
  dtype: ${actor.dtype}
  max_model_len: 65536
  gpu_memory_utilization: 0.8

# On-Policy Distillation settings
cache_size: 1000
proxy_base_url: http://localhost:8000
proxy_api_key: ""
proxy_model: qwen/qwen3-vl-8b-instruct
proxy_temperature: 1.0
proxy_max_tokens: 1024
proxy_top_p: 1.0
turn_discount: 1.0
export_style: individual
use_reward_scaling: true
reward_scaling_factor: 10.0
reward_bias: -0.5

# Teacher model configuration
teacher_base_url: http://localhost:8001
teacher_model_name: ""
teacher_top_k: 10
teacher_max_retries: 3
teacher_timeout: 60.0
teacher_missing_logprob: -23.0

# Tree Search Distilling specific settings
# cache_dir: set via command line +cache_dir=/path/to/cache
cache_dir: ""
assistant_marker: ""
student_top_k: 10

# Datasets
train_dataset:
  batch_size: 2
  shuffle: true
  pin_memory: true
  num_workers: 2
  path: customized_areal/tpfc/data/generated_training_final_update.parquet
  type: rl
  max_length: 20000

valid_dataset:
  batch_size: 2
  pin_memory: true
  num_workers: 2
  path: customized_areal/tpfc/data/generated_training_final_update.parquet
  type: rl
  max_length: 2048

# Utilities
saver:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: null
  freq_secs: null

recover:
  mode: disabled
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: null
  freq_secs: 3600

evaluator:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: null
  freq_steps: null
  freq_secs: null

stats_logger:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  wandb:
    mode: disabled
  # swanlab:
  #   project: tpfc-tree-distill
  #   mode: cloud
  #   api_key: WVB9KhdtDjWVAozYQgHu5

perf_tracer:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  enabled: true
  session_tracer:
    enabled: true
