experiment_name: tree-search-distilling
trial_name: trial0

seed: 1
enable_offload: false
total_train_epochs: 10
tokenizer_path: ${actor.path}

# Workflow configuration — use TreeDistillAgent for student-only logprobs
workflow: customized_areal.tree_search_distilling.TreeDistillAgent
eval_workflow: ${workflow}

cluster:
  n_nodes: 1
  n_gpus_per_node: 2
  fileroot: /dfs/share-groups/letrain/zhoujie/AReaL-main/tmp/areal/experiments
  name_resolve:
    type: nfs
    nfs_record_root: /dfs/share-groups/letrain/zhoujie/AReaL-main/tmp/areal/name_resolve

allocation_mode: sglang:d1+d1

scheduler:
  type: local

rollout:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  tokenizer_path: ${tokenizer_path}
  max_concurrent_rollouts: 8
  queue_size: null
  consumer_batch_size: ${train_dataset.batch_size}
  max_head_offpolicyness: 2
  enable_rollout_tracing: false
  scheduling_spec: ${actor.scheduling_spec}
  dump_to_file: true
  openai:
    mode: inline
    tool_call_parser: qwen25
    reasoning_parser: qwen3
    export_style: individual
    turn_discount: 1.0

gconfig:
  n_samples: 4
  min_new_tokens: 0
  max_new_tokens: 1024
  max_tokens: 2048
  greedy: false
  temperature: 1.0

actor:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  attn_impl: eager
  path: /dfs/share-groups/letrain/zhoujie/Qwen3-1.7B
  init_from_scratch: false
  disable_dropout: true
  gradient_checkpointing: true
  dtype: bfloat16
  mb_spec:
    max_tokens_per_mb: 10240
  optimizer:
    type: adam
    lr: 1.70e-5
    weight_decay: 0.017
    beta1: 0.9
    beta2: 0.999
    eps: 1e-8
    lr_scheduler_type: constant
    gradient_clipping: 1.0
    warmup_steps_proportion: 0.001
  eps_clip: 0.4
  temperature: ${gconfig.temperature}
  reward_scaling: 10.0
  reward_bias: -0.5
  kl_ctl: 0.0
  ppo_n_minibatches: 1
  recompute_logprob: true
  use_decoupled_loss: true
  behave_imp_weight_cap: 5.0
  reward_norm: null
  adv_norm:
    mean_level: batch
    std_level: batch
  weight_update_mode: xccl
  max_new_tokens: ${gconfig.max_new_tokens}
  scheduling_spec:
    - task_type: worker
      port_count: 2
      gpu: 1
      cmd: python3 -m areal.infra.rpc.rpc_server
      env_vars:
        NCCL_DEBUG: "WARN"
        NCCL_IB_DISABLE: "1"
        NCCL_SOCKET_IFNAME: "eth0"

ref:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: ${actor.path}
  init_from_scratch: false
  disable_dropout: true
  dtype: ${actor.dtype}
  mb_spec:
    max_tokens_per_mb: 10240
  optimizer: null
  scheduling_strategy:
    type: colocation
    target: actor
  scheduling_spec: ${actor.scheduling_spec}

# SGLang configuration
sglang:
  model_path: ${actor.path}
  random_seed: ${seed}
  skip_tokenizer_init: true
  dtype: ${actor.dtype}
  max_running_requests: null
  context_length: 40960
  mem_fraction_static: 0.8

# On-Policy Distillation settings
cache_size: 1000
proxy_base_url: http://localhost:8000
proxy_api_key: ""
proxy_model: qwen/qwen3-1.7b
proxy_temperature: 1.0
proxy_max_tokens: 1024
proxy_top_p: 1.0
turn_discount: 1.0
export_style: individual
use_reward_scaling: true
reward_scaling_factor: 10.0
reward_bias: -0.5

# Teacher model configuration
# Set teacher_model_name to enable teacher distillation.
# Leave empty (default) for student-only position logprobs (zero distillation rewards).
teacher_base_url: http://localhost:8001
teacher_model_name: ""
teacher_top_k: 10
teacher_max_retries: 3
teacher_timeout: 60.0
teacher_missing_logprob: -23.0

# Tree Search Distilling specific settings
# cache_dir: Directory for rollout cache and MCTS tree checkpoints
# Set via command line: cache_dir=/path/to/cache
cache_dir: ""
assistant_marker: ""
student_top_k: 10

# Datasets
train_dataset:
  batch_size: 2
  shuffle: true
  pin_memory: true
  num_workers: 4
  path: customized_areal/tpfc/data/generated_training_final_update.parquet
  type: tpfc_rl
  max_length: 4096

valid_dataset:
  batch_size: 2
  pin_memory: true
  num_workers: 4
  path: customized_areal/tpfc/data/generated_training_final_update.parquet
  type: tpfc_rl

# Utilities
saver:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: null
  freq_secs: null

recover:
  mode: disabled
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: null
  freq_secs: 3600

evaluator:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: null
  freq_secs: null

stats_logger:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  wandb:
    mode: disabled

perf_tracer:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  enabled: false
  session_tracer:
    enabled: false
